<!DOCTYPE html>
<html>
<head>
    <title>Tech Fest Registration Portal</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>🎉 Tech Fest 2026</h1>
    <h3>Register for the Event</h3>
    <p>Join us for exciting workshops, hackathons, and technical events.</p>

    <p><strong>Date:</strong> 15 September 2026</p>
    <p><strong>Venue:</strong> ITM Gwalior Auditorium</p>
    <p><strong>Time:</strong> 10:00 AM</p>
    
<form id="eventForm">

 <input type="text" id="name" placeholder="Enter your name">

<input type="email" id="email" placeholder="Enter your email">

<select id="event">
    <option value="">Select Event</option>
    <option>Web Development Workshop</option>
    <option>Hackathon</option>
    <option>AI Seminar</option>
    <option>Technical Quiz</option>
</select>

<input type="tel" id="phone" placeholder="Phone Number">

        <button type="submit">Register Now</button>

        <p id="message"></p>

    </form>
    <div id="userData"></div>

    <script src="script.js"></script>

</body>
</html>
